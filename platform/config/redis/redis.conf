# =============================================================================
# Redis Configuration — Fraud Detection Online Feature Store
# Optimized for: sub-millisecond feature retrieval, 10k TPS
# =============================================================================

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 640mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence — append-only for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Snapshotting (RDB) — periodic backup
save 900 1
save 300 10
save 60 10000

# Performance
hz 20
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Logging
loglevel notice
logfile ""

# Slow log — track queries >10ms
slowlog-log-slower-than 10000
slowlog-max-len 256

# Key expiry for feature TTLs
# Individual feature keys set TTL in application code:
# - real-time velocity features: TTL 3600 (1h)
# - device trust scores: TTL 86400 (24h)
# - user behavioral baseline: TTL 604800 (7d)
