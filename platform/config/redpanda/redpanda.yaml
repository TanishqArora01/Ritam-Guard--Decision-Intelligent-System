# =============================================================================
# Redpanda Configuration — Fraud Detection Ingestion Layer
# Target: 10k TPS sustained throughput
# =============================================================================

redpanda:
  data_directory: /var/lib/redpanda/data

  # Developer mode — disable in production
  developer_mode: true

  # Kafka API tuning
  kafka_batch_max_bytes: 1048576        # 1MB max batch
  fetch_max_bytes: 52428800             # 50MB max fetch
  max_kafka_throttle_delay_ms: 60000

  # Topic defaults
  default_num_partitions: 4
  default_replication_factor: 1
  log_retention_ms: 86400000           # 24 hours default
  log_segment_size: 134217728          # 128MB segments

  # Performance
  write_caching: true
  raft_io_timeout_ms: 10000

pandaproxy:
  pandaproxy_api:
    - address: 0.0.0.0
      port: 8082

schema_registry:
  schema_registry_api:
    - address: 0.0.0.0
      port: 8081
