# =============================================================================
# Neo4j Configuration — Fraud Graph Intelligence
# Graphs: transaction graph, device graph, identity graph
# =============================================================================

# Memory
server.memory.heap.initial_size=1G
server.memory.heap.max_size=2G
server.memory.pagecache.size=512M

# Network
server.default_listen_address=0.0.0.0
server.bolt.listen_address=0.0.0.0:7687
server.http.listen_address=0.0.0.0:7474

# Security
dbms.security.auth_enabled=true
server.config.strict_validation.enabled=false
dbms.security.procedures.unrestricted=apoc.*,gds.*
dbms.security.procedures.allowlist=apoc.*,gds.*

# APOC configuration
apoc.export.file.enabled=true
apoc.import.file.enabled=true
apoc.import.file.use_neo4j_config=true

# Query tuning
db.transaction.timeout=30s
db.lock.acquisition.timeout=10s

# Logging
server.logs.query.enabled=INFO
server.logs.query.threshold=1000ms

# Metrics
server.metrics.enabled=true
server.metrics.prometheus.enabled=true
