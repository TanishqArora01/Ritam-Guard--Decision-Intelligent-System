# security/nginx/nginx.conf
# Nginx reverse proxy for the Fraud Detection system.
# Routes:
#   /          → frontend (Next.js, port 3001)
#   /api/      → app-backend BFF (FastAPI, port 8400)
#   /ml/       → api-gateway ML service (FastAPI, port 8000)
#
# Security:
#   Rate limiting: 100 req/s per IP (burst 200)
#   Security headers: CSP, HSTS, X-Frame-Options, etc.
#   TLS: self-signed cert in dev (replace with Let's Encrypt in prod)

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/s;

    # Upstream definitions
    upstream frontend   { server frontend:3001;    keepalive 16; }
    upstream appbackend { server app-backend:8400; keepalive 32; }
    upstream mlgateway  { server api-gateway:8000; keepalive 32; }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS — main server block
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name localhost fraudguard.local;

        # TLS — replace with real cert in production
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"       always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;"
            always;

        # ---- App Backend API ----
        location /api/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass         http://appbackend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE support
            proxy_read_timeout  3600s;
            proxy_buffering     off;
            proxy_cache         off;
        }

        # Auth endpoints — stricter rate limit
        location /api/auth/login {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://appbackend/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- ML Gateway (for direct scoring from external systems) ----
        location /ml/ {
            limit_req zone=api burst=500 nodelay;

            # Require X-API-Key header (enforced by app-backend RBAC middleware)
            proxy_pass         http://mlgateway/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ---- Frontend ----
        location / {
            limit_req zone=general burst=500 nodelay;

            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }

        # ---- Health check (no auth, no rate limit) ----
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
